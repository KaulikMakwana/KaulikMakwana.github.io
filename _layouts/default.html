<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    
    <!-- TailwindCSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Add these lines after the TailwindCSS CDN link -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- JetBrains Mono Font -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            @apply bg-gray-900 text-gray-100;
        }
        .nav-link {
            @apply px-4 py-2 hover:text-green-400 transition-colors;
        }
        .section {
            @apply py-16 px-4 md:px-8;
        }
    </style>
    {% seo %}
</head>
<body>
    <!-- Navigation -->
    <nav class="fixed w-full bg-gray-900/95 backdrop-blur-sm border-b border-gray-800 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-green-400 font-bold">KM</a>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-4">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/about" class="nav-link">About</a>
                    <a href="/writeups" class="nav-link">Writeups</a>
                </div>
                
                <!-- Mobile Menu Button -->
                <button class="md:hidden text-gray-100" id="mobile-menu-button">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Mobile Menu -->
            <div class="hidden md:hidden" id="mobile-menu">
                <div class="px-2 pt-2 pb-3 space-y-1">
                    <a href="/" class="block nav-link">Home</a>
                    <a href="/about" class="block nav-link">About</a>
                    <a href="/writeups" class="block nav-link">Writeups</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="bg-gray-900 border-t border-gray-800 py-8">
        <div class="max-w-6xl mx-auto px-4 text-center text-gray-400">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
        </div>
    </footer>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Initialize AOS -->
    <script>
        AOS.init({
            duration: 800,
            once: true
        });

        // Mobile menu toggle
        document.getElementById('mobile-menu-button').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
<script src="{{ site.baseurl }}/assets/js/markdown-viewer.js"></script>
</body>
</html>
