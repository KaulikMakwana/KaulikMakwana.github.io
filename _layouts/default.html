<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="site-nav">
        <div class="container">
            <div class="nav-content">
                <a href="{{ '/' | relative_url }}" class="nav-link">Home</a>
                <a href="{{ '/about' | relative_url }}" class="nav-link">About</a>
                <a href="{{ '/writeups' | relative_url }}" class="nav-link">Writeups</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} | Cybersecurity Engineer & Penetration Tester</p>
            <div class="social-links">
                <a href="https://github.com/KaulikMakwana" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://linkedin.com/in/kaulikmakwana" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            </div>
        </div>
    </footer>
</body>
</html>
