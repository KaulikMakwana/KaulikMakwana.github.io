---
layout: default
---
<main class="writeup-container">
    <article class="writeup-content">
        <header class="writeup-header">
            <h1>{{ page.title }}</h1>
            <div class="writeup-meta">
                <span class="date"><i class="fas fa-calendar"></i> {{ page.date | date: "%B %d, %Y" }}</span>
                <span class="difficulty"><i class="fas fa-layer-group"></i> {{ page.difficulty }}</span>
            </div>
            <div class="writeup-tags">
                {% for tag in page.tags %}
                <span class="tag"><i class="fas fa-tag"></i> {{ tag }}</span>
                {% endfor %}
            </div>
        </header>

        <div class="writeup-body">
            {{ content }}
        </div>

        <footer class="writeup-footer">
            <div class="writeup-navigation">
                {% if page.previous.url %}
                <a class="prev" href="{{ page.previous.url }}">&larr; Previous Writeup</a>
                {% endif %}
                {% if page.next.url %}
                <a class="next" href="{{ page.next.url }}">Next Writeup &rarr;</a>
                {% endif %}
            </div>
        </footer>
    </article>
</main>
