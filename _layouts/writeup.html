---
layout: default
---
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />

<article class="writeup">
    <header class="writeup-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
        {% endif %}
    </header>

    <div class="writeup-content">
        {{ content }}
    </div>

    <footer class="writeup-footer">
        <div class="writeup-tags">
            {% if page.tags %}
            <div class="tags">
                {% for tag in page.tags %}
                <span class="tag">{{ tag }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </footer>
</article>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

<style>
.writeup {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 0;
}

.writeup-header {
    margin-bottom: 2rem;
    text-align: center;
}

.writeup-header h1 {
    color: var(--terminal-green);
    margin-bottom: 0.5rem;
}

.writeup-header time {
    color: var(--text-color);
    opacity: 0.8;
}

.writeup-content {
    line-height: 1.8;
}

.writeup-content h2 {
    margin-top: 2rem;
    margin-bottom: 1rem;
    color: var(--terminal-green);
}

.writeup-content p {
    margin-bottom: 1.5rem;
}

.writeup-content pre {
    margin: 1.5rem 0;
    padding: 1rem;
    overflow-x: auto;
}

.writeup-content code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
}

.writeup-footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--accent-color);
}

.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.tag {
    background-color: var(--secondary-color);
    color: var(--terminal-green);
    padding: 0.3rem 0.8rem;
    border-radius: 4px;
    font-size: 0.9em;
    border: 1px solid var(--accent-color);
}

/* Custom styles for tables */
.markdown-content table {
    width: 100%;
    border-collapse: collapse;
    background-color: #1f2937;
    border-radius: 0.5rem;
    overflow: hidden;
    margin: 1.5rem 0;
}

.markdown-content th {
    background-color: #374151;
    text-align: left;
    padding: 1rem;
    font-weight: 600;
    border-bottom: 1px solid #4b5563;
}

.markdown-content td {
    padding: 1rem;
    border-bottom: 1px solid #374151;
}

.markdown-content tr:hover {
    background-color: #374151;
    transition: background-color 0.2s;
}

/* Custom styles for code blocks */
.markdown-content pre[class*="language-"] {
    border-radius: 0.5rem;
    margin: 1.5rem 0;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

.markdown-content :not(pre) > code {
    border-radius: 0.25rem;
    padding: 0.2rem 0.4rem;
    background-color: #374151;
    font-size: 0.875em;
}

.markdown-content pre code {
    background-color: transparent;
    padding: 0;
}

/* Command prompt styling */
.markdown-content .command-prompt {
    background-color: #1f2937;
    padding: 1rem;
    border-radius: 0.5rem;
    border: 1px solid #374151;
    margin: 1rem 0;
    font-family: monospace;
    color: #4ade80;
}

.markdown-content .command-prompt::before {
    content: "$ ";
    color: #6b7280;
}

/* Terminal output styling */
.markdown-content .terminal-output {
    background-color: #111827;
    padding: 1rem;
    border-radius: 0.5rem;
    margin: 1rem 0;
    font-family: monospace;
    color: #d1d5db;
    white-space: pre-wrap;
}

/* Additional markdown content styles */
.markdown-content {
    color: #e5e7eb;
    line-height: 1.75;
}

.markdown-content h1,
.markdown-content h2,
.markdown-content h3,
.markdown-content h4 {
    color: #4ade80;
    margin-top: 2rem;
    margin-bottom: 1rem;
    font-weight: 600;
}

.markdown-content h1 { font-size: 2.25rem; }
.markdown-content h2 { font-size: 1.875rem; }
.markdown-content h3 { font-size: 1.5rem; }
.markdown-content h4 { font-size: 1.25rem; }

.markdown-content p {
    margin: 1rem 0;
}

.markdown-content a {
    color: #4ade80;
    text-decoration: none;
}

.markdown-content a:hover {
    text-decoration: underline;
}

.markdown-content ul,
.markdown-content ol {
    margin: 1rem 0;
    padding-left: 2rem;
}

.markdown-content li {
    margin: 0.5rem 0;
}

.markdown-content blockquote {
    border-left: 4px solid #4ade80;
    padding-left: 1rem;
    margin: 1.5rem 0;
    color: #9ca3af;
}
</style>

<script>
// Add line numbers to code blocks
document.addEventListener('DOMContentLoaded', (event) => {
    document.querySelectorAll('pre').forEach((block) => {
        block.classList.add('line-numbers');
    });

    // Convert shell code blocks to command prompts
    document.querySelectorAll('code[class*="language-shell"]').forEach((block) => {
        if (block.parentElement.tagName === 'PRE') {
            const lines = block.textContent.split('\n');
            const formattedLines = lines.map(line => {
                if (line.trim().startsWith('$') || line.trim().startsWith('>')) {
                    return `<span class="command-prompt">${line.trim().substring(2)}</span>`;
                } else {
                    return `<span class="terminal-output">${line}</span>`;
                }
            });
            block.innerHTML = formattedLines.join('\n');
        }
    });
});
</script>
