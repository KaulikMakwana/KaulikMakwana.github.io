---
layout: default
---

<article class="section">
  <div class="section-title">{{ page.title }}</div>
  <div class="meta">
    {{ page.difficulty | capitalize }} &nbsp; | &nbsp; {{ page.date | date: "%B %d, %Y" }}
  </div>
  <div class="tags">
    {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  </div>
  <div class="writeup-content">
    {{ content }}
  </div>
</article>
