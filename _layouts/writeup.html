---
layout: default
---
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />

<article class="section pt-24 min-h-screen">
    <div class="max-w-4xl mx-auto" data-aos="fade-up">
        <!-- Back to Writeups Link -->
        <div class="mb-8">
            <a href="/writeups" class="inline-flex items-center text-green-400 hover:text-green-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                Back to Writeups
            </a>
        </div>

        <header class="mb-8">
            <h1 class="text-4xl font-bold text-green-400">{{ page.title | default: "Untitled Writeup" }}</h1>
            <div class="text-gray-400 mt-2">
                {% if page.date %}
                    {{ page.date | date: "%B %d, %Y" }}
                    {% if page.platform %}
                    • <span class="text-green-400">{{ page.platform }}</span>
                    {% endif %}
                {% endif %}
            </div>
        </header>

        <div class="markdown-content prose prose-invert max-w-none">
            {{ content }}
        </div>
    </div>
</article>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

<style>
/* Custom styles for tables */
.markdown-content table {
    width: 100%;
    border-collapse: collapse;
    background-color: #1f2937;
    border-radius: 0.5rem;
    overflow: hidden;
    margin: 1.5rem 0;
}

.markdown-content th {
    background-color: #374151;
    text-align: left;
    padding: 1rem;
    font-weight: 600;
    border-bottom: 1px solid #4b5563;
}

.markdown-content td {
    padding: 1rem;
    border-bottom: 1px solid #374151;
}

.markdown-content tr:hover {
    background-color: #374151;
    transition: background-color 0.2s;
}

/* Custom styles for code blocks */
.markdown-content pre[class*="language-"] {
    border-radius: 0.5rem;
    margin: 1.5rem 0;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
}

.markdown-content :not(pre) > code {
    border-radius: 0.25rem;
    padding: 0.2rem 0.4rem;
    background-color: #374151;
    font-size: 0.875em;
}

.markdown-content pre code {
    background-color: transparent;
    padding: 0;
}

/* Command prompt styling */
.markdown-content .command-prompt {
    background-color: #1f2937;
    padding: 1rem;
    border-radius: 0.5rem;
    border: 1px solid #374151;
    margin: 1rem 0;
    font-family: monospace;
    color: #4ade80;
}

.markdown-content .command-prompt::before {
    content: "$ ";
    color: #6b7280;
}

/* Terminal output styling */
.markdown-content .terminal-output {
    background-color: #111827;
    padding: 1rem;
    border-radius: 0.5rem;
    margin: 1rem 0;
    font-family: monospace;
    color: #d1d5db;
    white-space: pre-wrap;
}

/* Additional markdown content styles */
.markdown-content {
    color: #e5e7eb;
    line-height: 1.75;
}

.markdown-content h1,
.markdown-content h2,
.markdown-content h3,
.markdown-content h4 {
    color: #4ade80;
    margin-top: 2rem;
    margin-bottom: 1rem;
    font-weight: 600;
}

.markdown-content h1 { font-size: 2.25rem; }
.markdown-content h2 { font-size: 1.875rem; }
.markdown-content h3 { font-size: 1.5rem; }
.markdown-content h4 { font-size: 1.25rem; }

.markdown-content p {
    margin: 1rem 0;
}

.markdown-content a {
    color: #4ade80;
    text-decoration: none;
}

.markdown-content a:hover {
    text-decoration: underline;
}

.markdown-content ul,
.markdown-content ol {
    margin: 1rem 0;
    padding-left: 2rem;
}

.markdown-content li {
    margin: 0.5rem 0;
}

.markdown-content blockquote {
    border-left: 4px solid #4ade80;
    padding-left: 1rem;
    margin: 1.5rem 0;
    color: #9ca3af;
}
</style>

<script>
// Add line numbers to code blocks
document.addEventListener('DOMContentLoaded', (event) => {
    document.querySelectorAll('pre').forEach((block) => {
        block.classList.add('line-numbers');
    });

    // Convert shell code blocks to command prompts
    document.querySelectorAll('code[class*="language-shell"]').forEach((block) => {
        if (block.parentElement.tagName === 'PRE') {
            const lines = block.textContent.split('\n');
            const formattedLines = lines.map(line => {
                if (line.trim().startsWith('$') || line.trim().startsWith('>')) {
                    return `<span class="command-prompt">${line.trim().substring(2)}</span>`;
                } else {
                    return `<span class="terminal-output">${line}</span>`;
                }
            });
            block.innerHTML = formattedLines.join('\n');
        }
    });
});
</script>
