<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
  {% include navbar.html %}
  <main class="writeup-container">
    <article class="writeup-content">
      <header class="writeup-header">
        <h1>{{ page.title }}</h1>
        <div class="writeup-meta">
          <span class="date">{{ page.date | date: "%B %d, %Y" }}</span>
          <span class="difficulty">{{ page.difficulty }}</span>
        </div>
        <div class="writeup-tags">
          {% for tag in page.tags %}
            <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
        {% if page.description %}
          <p class="writeup-description">{{ page.description }}</p>
        {% endif %}
      </header>
      <div class="writeup-body">
        {{ content }}
      </div>
    </article>
  </main>
  {% include footer.html %}
</body>
</html>
