title: "Kaulik Makwana"
description: "Offensive Security Engineer & Penetration Tester Portfolio"
baseurl: "" # for user.github.io root
url: "https://KaulikMakwana.github.io"
theme: minima

collections:
  writeups:
    output: true
    permalink: /writeups/:title/

# Navigation links for use in layouts
nav_links:
  - title: "About"
    url: "/#about"
  - title: "Expertise"
    url: "/#expertise"
  - title: "CTF Writeups"
    url: "/#writeups"
  - title: "Contact"
    url: "/#contact"

sass:
  style: compressed

# Exclude node_modules etc.
exclude:
  - node_modules
  - vendor
  - README.md
  - Gemfile
  - Gemfile.lock
