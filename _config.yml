# Site settings
title: "Kaulik Makwana"
description: "Cybersecurity Engineer & Penetration Tester specializing in offensive security"
baseurl: ""
url: "https://kaulikmakwana.github.io"
timezone: UTC

# Theme settings
theme: jekyll-theme-minimal
remote_theme: jekyll/minimal

# Collections
collections:
  writeups:
    output: true
    permalink: /writeups/:path/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "writeups"
    values:
      layout: "writeup"
  - scope:
      path: ""
    values:
      layout: "default"

# Build settings
markdown: kramdown
highlighter: rouge
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
