---
layout: default
title: CTF Writeups
---

<section class="section pt-24 min-h-screen">
    <div class="max-w-4xl mx-auto" data-aos="fade-up">
        <h1 class="text-4xl font-bold mb-8">CTF Writeups</h1>
        
        <div class="grid gap-6">
            {% for writeup in site.writeups %}
            <article class="bg-gray-800 rounded-lg p-6 hover:bg-gray-700 transition-colors">
                <h2 class="text-2xl font-bold mb-2">
                    <a href="{{ writeup.url }}" class="hover:text-green-400">
                        {{ writeup.title }}
                    </a>
                </h2>
                <div class="text-gray-400 mb-4">
                    {{ writeup.date | date: "%B %d, %Y" }}
                    {% if writeup.platform %}
                    • {{ writeup.platform }}
                    {% endif %}
                </div>
                <p class="text-gray-300">{{ writeup.excerpt | strip_html | truncate: 160 }}</p>
            </article>
            {% endfor %}
        </div>
    </div>
</section>
